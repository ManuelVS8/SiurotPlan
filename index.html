function saveDB(){

    },500);
  }
}

    try{
      const doc=await db.collection('usuarios').doc(user.uid).get();
      if(doc.exists){
        const p=doc.data();DB={...DB,...p};['areas','horario','plan','notas','personal','config','tramoBase'].forEach(k=>{if(p[k]!==undefined)DB[k]=p[k];});
        saveDB();
      }

    loadDB();applyDark();loadStgUI();

function renderOB2(){
const initColor=COLORS[colorIdx%COLORS.length];
const list=DB.areas.map(a=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--paper2);border-radius:8px;margin-bottom:5px"><span style="width:14px;height:14px;border-radius:50%;background:${a.color};flex-shrink:0"></span><div style="flex:1;font-weight:700;font-size:.88rem">${a.nombre}${a.grupo?' <span style="font-weight:400;color:var(--ink3);font-size:.78rem">('+a.grupo+')</span>':''}</div><button class="btn btn-ghost btn-xs" onclick="obEditArea('${a.id}')">✏️</button><button class="btn btn-danger btn-xs" onclick="DB.areas=DB.areas.filter(x=>x.id!=='${a.id}');saveDB();renderOB()">✕</button></div>`).join('')||'<div style="text-align:center;padding:16px;color:var(--ink3)">Aún no has añadido ningún área.</div>';

function obEditArea(id){const a=DB.areas.find(x=>x.id===id);if(!a)return;openModal(`<div class="modal-title">✏️ Editar área</div><div class="fg"><label>Nombre</label><input type="text" id="ea-nombre" value="${a.nombre}"></div><div class="fg"><label>Aula / Grupo</label><input type="text" id="ea-grupo" value="${a.grupo||''}" placeholder="Ej: 3ºA"></div><div class="fg"><label>Tipo</label><div style="display:flex;gap:12px"><label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:600"><input type="radio" name="ea-tipo" value="docencia" ${a.tipo==='docencia'?'checked':''}> 📖 Docencia</label><label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:600"><input type="radio" name="ea-tipo" value="nd" ${a.tipo!=='docencia'?'checked':''}> 🗂️ No doc.</label></div></div>${colorModalHTML(a.color,'ea')}<div class="modal-actions"><button class="btn btn-ink" onclick="const i=DB.areas.findIndex(x=>x.id==='${id}');if(i>=0){DB.areas[i].nombre=document.getElementById('ea-nombre').value.trim()||DB.areas[i].nombre;DB.areas[i].grupo=document.getElementById('ea-grupo').value.trim();DB.areas[i].tipo=document.querySelector('input[name=ea-tipo]:checked')?.value||'docencia';DB.areas[i].color=document.getElementById('ea-color').value;saveDB();}closeModal();renderOB()">💾 Guardar</button><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button></div>`);setTimeout(()=>selColor(a.color,'ea'),40);}

function renderOB3(){
if(!DB.tramoBase)DB.tramoBase=[];const list=DB.tramoBase.map(t=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:${t.recreo?'var(--paper3)':'var(--paper2)'};border-radius:8px;margin-bottom:5px;${t.recreo?'font-style:italic':''}"><span style="font-family:monospace;font-size:.78rem;color:var(--ink3)">${t.inicio}–${t.fin}</span><span style="flex:1;font-weight:${t.recreo?'400':'700'};font-size:.85rem">${t.recreo?'☀️ Recreo':'Sesión'}</span><button class="btn btn-danger btn-xs" onclick="DB.tramoBase=DB.tramoBase.filter(x=>x.id!=='${t.id}');saveDB();renderOB()">✕</button></div>`).join('')||'<div style="text-align:center;padding:16px;color:var(--ink3)">Aún no hay tramos.</div>';const hasTramos=DB.tramoBase.length>0;return obShell(3,5,'🕐','Define los tramos del día','Añade los bloques horarios.',`<div style="margin-bottom:14px">${list}</div><div style="background:var(--paper2);border-radius:var(--r);padding:14px;border:1px dashed var(--paper3)"><div class="sec-label" style="margin-bottom:10px">➕ Nuevo tramo</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px"><div class="fg" style="margin:0"><label>Inicio</label><input type="time" id="ob-t-inicio" value="09:00"></div><div class="fg" style="margin:0"><label>Fin</label><input type="time" id="ob-t-fin" value="10:00"></div></div><div style="display:flex;gap:8px;margin-top:4px"><button class="btn btn-ink btn-sm" style="flex:1" onclick="obAddTramo(false)">➕ Sesión</button><button class="btn btn-ghost btn-sm" style="flex:1" onclick="obAddTramo(true)">☀️ Recreo</button></div></div>`,`<button class="btn btn-ghost" onclick="obStep=2;renderOB()">← Atrás</button><button class="btn btn-ink" style="margin-left:auto" onclick="buildHorarioFromTramos();obStep=4;renderOB()" ${hasTramos?'':'disabled'}>${hasTramos?'Siguiente →':'Añade al menos un tramo'}</button>`);}
function obAddTramo(esRecreo){const inicio=document.getElementById('ob-t-inicio').value||'09:00';const fin=document.getElementById('ob-t-fin').value||'10:00';if(inicio>=fin){toast('Fin debe ser posterior');return;}if(!DB.tramoBase)DB.tramoBase=[];DB.tramoBase.push({id:uid(),inicio,fin,recreo:esRecreo});DB.tramoBase.sort((a,b)=>a.inicio.localeCompare(b.inicio));saveDB();document.getElementById('ob-t-inicio').value=fin;renderOB();toast(esRecreo?'Recreo añadido':'Tramo añadido');}
function buildHorarioFromTramos(){DIAS_K.forEach(dia=>{const existing=DB.horario[dia]||[];DB.horario[dia]=(DB.tramoBase||[]).map(t=>{const ex=existing.find(s=>s.inicio===t.inicio&&s.fin===t.fin);if(ex)return{...ex,recreo:t.recreo};return{id:uid(),inicio:t.inicio,fin:t.fin,areaId:null,split:false,splitAId:null,splitBId:null,recreo:t.recreo};});});saveDB();}
function renderOB4(){return obShell(4,5,'🎨','Asigna las áreas al horario','Elige un área de la paleta y pulsa las celdas.',`<div id="ob-horario-editor" style="margin-top:4px">${renderHorarioEditor(true)}</div>`,`<button class="btn btn-ghost" onclick="obStep=3;renderOB()">← Atrás</button><button class="btn btn-accent" style="margin-left:auto" onclick="saveDB();showApp();toast('Todo listo!')">🚀 ¡Comenzar!</button>`);}

function colorModalHTML(init,idPrefix){const sw=COLORS.map(c=>`<div class="cs-dot" data-c="${c}" style="background:${c}" onclick="selColor('${c}','${idPrefix}')"></div>`).join('');return `<div class="fg"><label>Color</label><div class="color-strip" id="${idPrefix}-strip">${sw}</div><div class="color-picker-row"><label>🎨 Libre:</label><input type="color" id="${idPrefix}-picker" value="${init}" oninput="onPickerChange('${idPrefix}')"><input type="text" id="${idPrefix}-hex" class="color-hex-input" value="${init}" maxlength="7" oninput="onHexChange('${idPrefix}')"><input type="hidden" id="${idPrefix}-color" value="${init}"></div></div>`;}
function selColor(c,pfx){const s=document.getElementById(pfx+'-strip');if(s)s.querySelectorAll('.cs-dot').forEach(d=>d.classList.toggle('sel',d.dataset.c===c));document.getElementById(pfx+'-color').value=c;document.getElementById(pfx+'-picker').value=c;document.getElementById(pfx+'-hex').value=c.toUpperCase();}
function onPickerChange(pfx){const c=document.getElementById(pfx+'-picker').value;document.getElementById(pfx+'-color').value=c;document.getElementById(pfx+'-hex').value=c.toUpperCase();const s=document.getElementById(pfx+'-strip');if(s)s.querySelectorAll('.cs-dot').forEach(d=>d.classList.remove('sel'));}
function onHexChange(pfx){let v=document.getElementById(pfx+'-hex').value.trim();if(!v.startsWith('#'))v='#'+v;if(/^#[0-9A-Fa-f]{6}$/.test(v)){document.getElementById(pfx+'-color').value=v;document.getElementById(pfx+'-picker').value=v;const s=document.getElementById(pfx+'-strip');if(s)s.querySelectorAll('.cs-dot').forEach(d=>d.classList.toggle('sel',d.dataset.c===v));}}

let undoStack=null,undoTimer=null;
function pushUndo(){undoStack=JSON.stringify({areas:DB.areas,horario:DB.horario});const btn=document.getElementById('undo-btn');if(btn){btn.style.display='flex';clearTimeout(undoTimer);undoTimer=setTimeout(()=>{btn.style.display='none';undoStack=null;},6000);}}
function doUndo(){if(!undoStack){toast('No hay nada que deshacer');return;}const prev=JSON.parse(undoStack);DB.areas=prev.areas;DB.horario=prev.horario;undoStack=null;document.getElementById('undo-btn').style.display='none';saveDB();renderTab();toast('Deshecho');}

function showApp(){document.getElementById('view-ob').style.display='none';document.getElementById('view-app').style.display='block';renderApp();}
function renderApp(){document.getElementById('view-app').innerHTML=`<div class="nav-tabs" id="nav-tabs"><button class="nav-tab ${curTab==='calendario'?'active':''}" onclick="switchTab('calendario')"><span class="ti">🗓️</span>Mes</button><button class="nav-tab ${curTab==='semana'?'active':''}" onclick="switchTab('semana')"><span class="ti">📅</span>Semana</button><button class="nav-tab ${curTab==='dia'?'active':''}" onclick="switchTab('dia')"><span class="ti">📋</span>Día</button><button class="nav-tab ${curTab==='area'?'active':''}" onclick="switchTab('area')"><span class="ti">📖</span>Por área</button><button class="nav-tab ${curTab==='resumen'?'active':''}" onclick="switchTab('resumen')"><span class="ti">📊</span>Stats</button></div><div id="tab-body"></div>`;renderTab();}
function switchTab(t){tap();curTab=t;document.querySelectorAll('.nav-tab').forEach((b,i)=>b.classList.toggle('active',['calendario','semana','dia','area','resumen'][i]===t));renderTab();}
function setbn(id){document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));document.getElementById(id)?.classList.add('active');}
function renderTab(){const c=document.getElementById('tab-body');if(!c)return;if(curTab==='calendario')c.innerHTML=renderCal();else if(curTab==='semana')c.innerHTML=renderSemana();else if(curTab==='dia')c.innerHTML=renderDia();else if(curTab==='area')c.innerHTML=renderAreaView();else if(curTab==='horario'){c.innerHTML=renderHorarioTab();}else if(curTab==='resumen')c.innerHTML=renderResumen();}
function goToday(){tap();selDate=new Date();curMonth=selDate.getMonth();curYear=selDate.getFullYear();curTab='calendario';renderApp();}

function renderCal(){const hoy=new Date();const pd=new Date(curYear,curMonth,1);const dm=new Date(curYear,curMonth+1,0).getDate();let di=pd.getDay();if(di===0)di=7;di--;const prev=new Date(curYear,curMonth,0).getDate();let cells='';for(let i=di-1;i>=0;i--)cells+=`<div class="cal-day other"><span>${prev-i}</span></div>`;for(let d=1;d<=dm;d++){const dk=`${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const isH=d===hoy.getDate()&&curMonth===hoy.getMonth()&&curYear===hoy.getFullYear();const isS=d===selDate.getDate()&&curMonth===selDate.getMonth()&&curYear===selDate.getFullYear();const plan=DB.plan[dk]||{};const fills=Object.values(plan).filter(v=>v.texto);const dkKey=diaKey(new Date(curYear,curMonth,d));const daySlots=(dkKey?DB.horario[dkKey]:[])||[];const playable=daySlots.filter(s=>!s.recreo);const allDone=playable.length>0&&playable.every(s=>{if(s.split)return(plan[s.id+'_a']?.texto)&&(plan[s.id+'_b']?.texto);return plan[s.id]?.texto;});const dots=fills.slice(0,4).map(()=>`<div class="dot" style="background:${isS?'rgba(255,255,255,.7)':'var(--blue2)'}"></div>`).join('');const dow=new Date(curYear,curMonth,d).getDay();cells+=`<div class="cal-day ${isH&&!isS?'today':''} ${isS?'sel':''} ${dow===0||dow===6?'weekend':''}" onclick="selDate=new Date(curYear,curMonth,${d});renderTab()">${allDone?'<span class="day-check">✓</span>':''}<span>${d}</span>${fills.length&&!allDone?`<div class="dot-row">${dots}</div>`:''}</div>`;}const tot=di+dm;const sig=tot%7===0?0:7-(tot%7);for(let i=1;i<=sig;i++)cells+=`<div class="cal-day other"><span>${i}</span></div>`;return `<div class="card"><div class="cal-nav"><button class="btn btn-ghost btn-sm" onclick="curMonth--;if(curMonth<0){curMonth=11;curYear--;}renderTab()">‹</button><div class="cal-month">${MESES[curMonth]} ${curYear}</div><button class="btn btn-ghost btn-sm" onclick="curMonth++;if(curMonth>11){curMonth=0;curYear++;}renderTab()">›</button></div><div class="cal-grid-m">${DIAS_C.map(d=>`<div class="cal-dn">${d}</div>`).join('')}${cells}</div></div><div class="card" style="cursor:pointer;background:linear-gradient(135deg,var(--ink),var(--ink2));color:#fff;padding:14px 18px" onclick="switchTab('dia')"><div class="flex-between"><div><div style="font-size:.68rem;opacity:.5;text-transform:uppercase;margin-bottom:3px">Abrir planificación</div><div style="font-family:'Playfair Display',serif">${selDate.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div></div><span style="font-size:1.4rem;opacity:.6">→</span></div></div>`;}

function renderSemana(){const lunes=getMonday(selDate);const days=Array.from({length:5},(_,i)=>{const d=new Date(lunes);d.setDate(d.getDate()+i);return d;});const refSlots=DB.horario['lunes']||[];if(!refSlots.length)return `<div class="card"><div class="empty"><div class="ei">🕐</div><p>Sin horario.</p></div></div>`;let bodyRows='';refSlots.forEach(refSlot=>{if(refSlot.recreo){bodyRows+=`<tr><td class="wt-time-cell">☀️</td><td colspan="5" style="text-align:center;padding:6px;background:var(--paper2);font-size:.7rem;font-style:italic;color:var(--ink3)">RECREO</td></tr>`;return;}let cells='';days.forEach(d=>{const dk=fmtDate(d);const dkKey=diaKey(d);const slots=(dkKey?DB.horario[dkKey]:[])||[];const plan=DB.plan[dk]||{};const slot=slots.find(s=>s.inicio===refSlot.inicio&&s.fin===refSlot.fin);if(!slot){cells+=`<td><div class="wt-slot empty"></div></td>`;return;}if(slot.split){const aA=getArea(slot.splitAId);const aB=getArea(slot.splitBId);const mid=calcMid(slot.inicio,slot.fin);const doneA=!!(plan[slot.id+'_a']?.texto);const doneB=!!(plan[slot.id+'_b']?.texto);cells+=`<td><div class="wt-slot split-top has-area" style="background:${aA?aA.color:'#94a3b8'}" onclick="selDate=new Date('${dk}T12:00:00');switchTab('dia')"><span class="ws-area" style="font-size:${cellFontSize(areaLabelShort(slot.splitAId,9),.62,.42)}">${areaLabelShort(slot.splitAId,9)}</span>${doneA?'<span class="ws-done">✓</span>':''}</div><div class="wt-slot split-bot has-area" style="background:${aB?aB.color:'#94a3b8'}" onclick="selDate=new Date('${dk}T12:00:00');switchTab('dia')"><span class="ws-area" style="font-size:${cellFontSize(areaLabelShort(slot.splitBId,9),.62,.42)}">${areaLabelShort(slot.splitBId,9)}</span>${doneB?'<span class="ws-done">✓</span>':''}</div></td>`;return;}const area=getArea(slot.areaId);const done=!!(plan[slot.id]?.texto);const bg=area?area.color:'var(--paper2)';const lbl=area?areaLabel(slot.areaId):'';cells+=`<td><div class="wt-slot ${area?'has-area':'empty'}" style="${area?`background:${bg}`:''}" onclick="selDate=new Date('${dk}T12:00:00');switchTab('dia')">${area?`<span class="ws-area" style="font-size:${cellFontSize(lbl,.68,.42)}">${lbl.length>14?lbl.substring(0,13)+'…':lbl}</span>`:''}${done?'<span class="ws-done">✓</span>':''}</div></td>`;});bodyRows+=`<tr><td class="wt-time-cell">${refSlot.inicio}<br>${refSlot.fin}</td>${cells}</tr>`;});const lunesStr=lunes.toLocaleDateString('es-ES',{day:'numeric',month:'long'});const viernesD=new Date(lunes);viernesD.setDate(viernesD.getDate()+4);const viernesStr=viernesD.toLocaleDateString('es-ES',{day:'numeric',month:'long'});return `<div class="card" style="padding:14px 16px"><div class="flex-between" style="margin-bottom:12px;flex-wrap:wrap;gap:8px"><div><div class="sec-label">Vista semanal</div><div style="font-weight:700;font-size:.9rem;cursor:pointer" onclick="openGotoDate()">${lunesStr} – ${viernesStr} 📅</div></div><div class="flex-row"><button class="btn btn-ghost btn-sm" onclick="selDate=new Date(selDate.getFullYear(),selDate.getMonth(),selDate.getDate()-7);renderTab()">‹</button><button class="btn btn-ghost btn-sm" onclick="selDate=new Date(selDate.getFullYear(),selDate.getMonth(),selDate.getDate()+7);renderTab()">›</button><button class="btn btn-teal btn-sm" onclick="openRangePDFPicker()">⬇️ PDF periodo</button></div></div><div class="week-view-wrap"><table class="week-table"><thead><tr><th class="wt-time">Hora</th>${days.map(d=>`<th>${DIAS_N[['lunes','martes','miercoles','jueves','viernes'].indexOf(diaKey(d))]||''}</th>`).join('')}</tr></thead><tbody>${bodyRows}</tbody></table></div></div>`;}
function calcMid(inicio,fin){const[h1,m1]=inicio.split(':').map(Number);const[h2,m2]=fin.split(':').map(Number);const mid=Math.round(((h1*60+m1)+(h2*60+m2))/2);return `${String(Math.floor(mid/60)).padStart(2,'0')}:${String(mid%60).padStart(2,'0')}`;}

function renderDia(){const dk=fmtDate(selDate);const dkKey=diaKey(selDate);const slots=dkKey?(DB.horario[dkKey]||[]):[];const plan=DB.plan[dk]||{};const nota=DB.notas[dk]||'';const isWeekend=!dkKey;const playableSlots=slots.filter(s=>!s.recreo);const filledSlots=playableSlots.filter(s=>{if(s.split)return(plan[s.id+'_a']?.texto)||(plan[s.id+'_b']?.texto);return plan[s.id]?.texto;});const pct=playableSlots.length?Math.round(filledSlots.length/playableSlots.length*100):0;let body='';if(isWeekend){body=`<div class="no-horario"><div style="font-size:2.2rem;margin-bottom:8px">🏖️</div><p style="font-weight:700">Fin de semana</p></div>`;}else if(!slots.length){body=`<div class="no-horario"><p style="font-weight:700">Sin horario</p></div>`;}else{body=slots.map(s=>{if(s.recreo)return `<div style="text-align:center;padding:7px 0;font-size:.78rem;font-style:italic;color:var(--ink3)">☀️ RECREO</div>`;if(s.split){const mid=calcMid(s.inicio,s.fin);return renderHalfSlot(s.id+'_a',s.id+'_b',s.splitAId,s.splitBId,s.inicio,mid,s.fin,dk,plan);}return renderSlotCard(s,dk,plan);}).join('');}return `<div class="card" style="padding:13px 16px"><div class="day-nav"><button class="btn btn-ghost btn-sm" onclick="selDate=new Date(selDate.getFullYear(),selDate.getMonth(),selDate.getDate()-1);renderTab()">‹</button><div class="dn-label" onclick="openGotoDate()" style="cursor:pointer">${selDate.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})} 📅</div><button class="btn btn-ghost btn-sm" onclick="selDate=new Date(selDate.getFullYear(),selDate.getMonth(),selDate.getDate()+1);renderTab()">›</button></div>${playableSlots.length?`<div class="prog-bar-wrap" style="margin-bottom:8px"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><span style="font-size:.8rem;color:var(--ink3)">${filledSlots.length}/${playableSlots.length}</span><button class="btn btn-teal btn-sm" onclick="downloadDayPDF('${dk}')">⬇️ PDF día</button></div>`:''}</div><div id="slots-container">${body}</div><div class="card"><label>📝 Notas del día</label><textarea placeholder="Observaciones..." style="width:100%;min-height:70px;resize:vertical;margin-top:6px" onchange="DB.notas['${dk}']=this.value;saveDB()">${nota}</textarea></div>`;}
function renderSlotCard(s,dk,plan){const p=plan[s.id]||{};const area=getArea(s.areaId);const color=area?area.color:'#6a8aaa';const lbl=area?areaLabel(s.areaId):'Sin área';return `<div class="day-tramo"><div class="dt-header" onclick="this.nextElementSibling.classList.toggle('open')"><div class="dt-time" style="background:${color}">${s.inicio}<br><span style="opacity:.7;font-size:.62rem">${s.fin}</span></div><div class="dt-name">${lbl}</div><span class="dt-status">${p.texto?'▾':'▸'}</span></div><div class="dt-body ${p.texto?'open':''}"><textarea placeholder="Actividad..." rows="3" style="width:100%;margin-top:4px" onchange="if(!DB.plan['${dk}'])DB.plan['${dk}']={};if(!DB.plan['${dk}']['${s.id}'])DB.plan['${dk}']['${s.id}']={};DB.plan['${dk}']['${s.id}'].texto=this.value;saveDB()">${p.texto||''}</textarea></div></div>`;}
function renderHalfSlot(idA,idB,areaAId,areaBId,inicio,mid,fin,dk,plan){const pA=plan[idA]||{};const pB=plan[idB]||{};const aA=getArea(areaAId);const aB=getArea(areaBId);return `<div class="day-tramo"><div class="dt-header" onclick="this.nextElementSibling.classList.toggle('open')"><div class="dt-time" style="background:${aA?aA.color:'#65a30d'}">${inicio}<br><span style="opacity:.7;font-size:.62rem">${mid}</span></div><div class="dt-name">${aA?areaLabel(areaAId):'Sin área'}</div><span style="font-size:.65rem;background:var(--paper3);border-radius:6px;padding:2px 7px;color:var(--ink3)">½</span><span class="dt-status">${pA.texto?'▾':'▸'}</span></div><div class="dt-body ${pA.texto?'open':''}"><textarea placeholder="Actividad..." rows="3" style="width:100%;margin-top:4px" onchange="if(!DB.plan['${dk}'])DB.plan['${dk}']={};if(!DB.plan['${dk}']['${idA}'])DB.plan['${dk}']['${idA}']={};DB.plan['${dk}']['${idA}'].texto=this.value;saveDB()">${pA.texto||''}</textarea></div></div><div class="day-tramo"><div class="dt-header" onclick="this.nextElementSibling.classList.toggle('open')"><div class="dt-time" style="background:${aB?aB.color:'#1d4ed8'}">${mid}<br><span style="opacity:.7;font-size:.62rem">${fin}</span></div><div class="dt-name">${aB?areaLabel(areaBId):'Sin área'}</div><span style="font-size:.65rem;background:var(--paper3);border-radius:6px;padding:2px 7px;color:var(--ink3)">½</span><span class="dt-status">${pB.texto?'▾':'▸'}</span></div><div class="dt-body ${pB.texto?'open':''}"><textarea placeholder="Actividad..." rows="3" style="width:100%;margin-top:4px" onchange="if(!DB.plan['${dk}'])DB.plan['${dk}']={};if(!DB.plan['${dk}']['${idB}'])DB.plan['${dk}']['${idB}']={};DB.plan['${dk}']['${idB}'].texto=this.value;saveDB()">${pB.texto||''}</textarea></div></div>`;}

function renderAreaView(){const areasEnHorario=new Set();Object.values(DB.horario).forEach(slots=>slots.forEach(s=>{if(s.recreo)return;if(s.split){if(s.splitAId)areasEnHorario.add(s.splitAId);if(s.splitBId)areasEnHorario.add(s.splitBId);}else if(s.areaId)areasEnHorario.add(s.areaId);}));const areasFiltradas=DB.areas.filter(a=>areasEnHorario.has(a.id));if(!areasFiltradas.length)return `<div class="card"><div class="empty"><p>No hay áreas en el horario.</p></div></div>`;if(!areaViewId||!areasEnHorario.has(areaViewId))areaViewId=areasFiltradas[0].id;const area=getArea(areaViewId);const lunes=getMonday(areaWeekDate);const viernesD=new Date(lunes);viernesD.setDate(viernesD.getDate()+4);const lunesStr=lunes.toLocaleDateString('es-ES',{day:'numeric',month:'long'});const viernesStr=viernesD.toLocaleDateString('es-ES',{day:'numeric',month:'long'});const selector=areasFiltradas.map(a=>`<button class="area-sel-btn ${a.id===areaViewId?'active':''}" style="${a.id===areaViewId?`background:${a.color}`:''}" onclick="areaViewId='${a.id}';renderTab()">${a.nombre}</button>`).join('');let weekHTML='';for(let i=0;i<5;i++){const d=new Date(lunes);d.setDate(d.getDate()+i);const dk=fmtDate(d);const dkKey=diaKey(d);const slots=(dkKey?DB.horario[dkKey]:[])||[];const mySlots=[];slots.forEach(s=>{if(s.recreo)return;if(s.split){const mid=calcMid(s.inicio,s.fin);if(s.splitAId===areaViewId)mySlots.push({id:s.id+'_a',inicio:s.inicio,fin:mid});if(s.splitBId===areaViewId)mySlots.push({id:s.id+'_b',inicio:mid,fin:s.fin});}else if(s.areaId===areaViewId){mySlots.push({id:s.id,inicio:s.inicio,fin:s.fin});}});if(!mySlots.length)continue;const plan=DB.plan[dk]||{};const slotsHTML=mySlots.map(sl=>{const p=plan[sl.id]||{};return `<div class="av-slot" style="border-left-color:${area.color}"><div class="av-slot-time">${sl.inicio} – ${sl.fin}</div><textarea placeholder="Actividad..." onchange="if(!DB.plan['${dk}'])DB.plan['${dk}']={};if(!DB.plan['${dk}']['${sl.id}'])DB.plan['${dk}']['${sl.id}']={};DB.plan['${dk}']['${sl.id}'].texto=this.value;saveDB()" style="border-left:3px solid ${area.color}">${p.texto||''}</textarea></div>`;}).join('');weekHTML+=`<div class="av-day-section"><div class="av-day-label">${d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'short'})}</div>${slotsHTML}</div>`;}return `<div class="card"><div class="flex-between" style="margin-bottom:12px"><div><div class="sec-label">Vista por área</div><div style="font-family:'Playfair Display',serif;font-size:1rem"><span style="width:12px;height:12px;border-radius:50%;background:${area.color};display:inline-block"></span> ${areaLabel(areaViewId)}</div></div><div class="flex-row"><button class="btn btn-ghost btn-sm" onclick="areaWeekDate=new Date(areaWeekDate.getFullYear(),areaWeekDate.getMonth(),areaWeekDate.getDate()-7);renderTab()">‹</button><span style="font-weight:700;font-size:.85rem">${lunesStr} – ${viernesStr}</span><button class="btn btn-ghost btn-sm" onclick="areaWeekDate=new Date(areaWeekDate.getFullYear(),areaWeekDate.getMonth(),areaWeekDate.getDate()+7);renderTab()">›</button></div></div><div class="area-selector">${selector}</div></div><div>${weekHTML||'<div class="card"><div class="empty"><p>Sin sesiones esta semana.</p></div></div>'}</div>`;}

function renderHorarioTab(){return `<div class="card"><div class="flex-between" style="margin-bottom:12px"><div><div style="font-family:'Playfair Display',serif;font-size:1.05rem">Horario Semanal</div><div class="text-sm text-muted">Pinta las sesiones eligiendo un área</div></div><button class="btn btn-ghost btn-sm" onclick="addArea()">+ Nueva área</button></div>${renderHorarioEditor(false)}</div>`;}
function renderHorarioEditor(inline){const refSlots=DB.horario['lunes']||Object.values(DB.horario)[0]||[];const areaBtns=DB.areas.map(a=>`<div class="area-pill ${paintingAreaId===a.id?'painting':''}" style="background:${a.color}" onclick="paintingAreaId='${a.id}';refreshHorario()">${a.nombre}${a.grupo?' ('+a.grupo+')':''}</div>`).join('');let gridHTML=`<div class="sched-grid"><div class="sg-hdr time-hdr">Hora</div>${DIAS_N.map(d=>`<div class="sg-hdr">${d}</div>`).join('')}`;refSlots.forEach(refSlot=>{if(refSlot.recreo){gridHTML+=`<div class="sg-time"><span>${refSlot.inicio}</span><span>${refSlot.fin}</span></div><div class="sg-cell recreo">☀️ RECREO</div>`;return;}gridHTML+=`<div class="sg-time"><span>${refSlot.inicio}</span><span style="opacity:.6">${refSlot.fin}</span></div>`;DIAS_K.forEach(diaK=>{const dSlots=DB.horario[diaK]||[];const slot=dSlots.find(s=>s.inicio===refSlot.inicio&&s.fin===refSlot.fin);if(!slot){gridHTML+=`<div class="sg-cell" onclick="cellClick('${diaK}','${refSlot.inicio}','${refSlot.fin}')">+</div>`;return;}if(slot.split){const aA=getArea(slot.splitAId);const aB=getArea(slot.splitBId);const lblA=areaLabelShort(slot.splitAId,8);const lblB=areaLabelShort(slot.splitBId,8);gridHTML+=`<div class="sg-cell split"><div class="half top" style="background:${aA?aA.color:'#65a30d'};font-size:${cellFontSize(lblA,.7,.42)}" onclick="halfClick('${diaK}','${slot.id}','A')">${lblA}</div><div class="divider-line"></div><div class="half bot" style="background:${aB?aB.color:'#1d4ed8'};font-size:${cellFontSize(lblB,.7,.42)}" onclick="halfClick('${diaK}','${slot.id}','B')">${lblB}</div><span class="split-indicator">½</span><span class="unsplit-btn" onclick="event.stopPropagation();unsplitSlot('${diaK}','${slot.id}')">⊞</span></div>`;return;}const area=getArea(slot.areaId);const bg=area?area.color:'var(--paper2)';const lbl=area?areaLabelShort(slot.areaId,12):'+';const fs=area?cellFontSize(areaLabel(slot.areaId),.75,.48):'.75rem';gridHTML+=`<div class="sg-cell assigned" style="background:${bg};font-size:${fs}" onclick="cellClick('${diaK}','${refSlot.inicio}','${refSlot.fin}')">${lbl}<span class="remove-btn" onclick="event.stopPropagation();removeSlotArea('${diaK}','${slot.id}')">✕</span></div>`;});});gridHTML+='</div>';return `<div><div style="margin-bottom:10px"><div class="sec-label" style="margin-bottom:7px">1. Elige un área</div><div class="area-palette">${areaBtns}<div class="area-pill" style="background:#6a8aaa" onclick="paintingAreaId=null;refreshHorario()">✕ Borrar</div></div></div>${paintingAreaId!==null?`<div class="warn-box">🎨 Pintando: <strong>${paintingAreaId?areaLabel(paintingAreaId):'Borrar'}</strong></div>`:''}<div style="margin-bottom:10px"><div class="sec-label">2. Pulsa las celdas</div><div class="grid-wrap">${gridHTML}</div></div><div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-ghost btn-sm" onclick="addSlotRow()">+ Añadir tramo</button><button class="btn btn-ghost btn-sm" onclick="toggleSplitMode()">⚡ Dividir sesión</button></div></div>`;}
function refreshHorario(){const tabBody=document.getElementById('tab-body');if(tabBody){renderTab();}else{const editorWrap=document.getElementById('ob-horario-editor');if(editorWrap)editorWrap.innerHTML=renderHorarioEditor(true);}}
function cellClick(diaK,inicio,fin){tap();if(!DB.horario[diaK])DB.horario[diaK]=[];let slot=DB.horario[diaK].find(s=>s.inicio===inicio&&s.fin===fin);if(!slot){slot={id:uid(),inicio,fin,areaId:null,split:false,recreo:false};DB.horario[diaK].push(slot);}if(slot.recreo)return;pushUndo();if(paintingAreaId===null){slot.areaId=null;slot.split=false;slot.splitAId=null;slot.splitBId=null;}else{slot.areaId=paintingAreaId;}saveDB();refreshHorario();}
function halfClick(diaK,slotId,half){tap();const slot=DB.horario[diaK]?.find(s=>s.id===slotId);if(!slot||!slot.split)return;pushUndo();if(paintingAreaId===null){if(half==='A')slot.splitAId=null;else slot.splitBId=null;if(!slot.splitAId&&!slot.splitBId){slot.split=false;slot.areaId=null;}}else{if(half==='A')slot.splitAId=paintingAreaId;else slot.splitBId=paintingAreaId;}saveDB();refreshHorario();}
function removeSlotArea(diaK,slotId){tap();const slot=DB.horario[diaK]?.find(s=>s.id===slotId);if(!slot)return;pushUndo();slot.areaId=null;slot.split=false;slot.splitAId=null;slot.splitBId=null;saveDB();refreshHorario();}
function actionUnsplitSlot(diaK,slotId){const slot=DB.horario[diaK]?.find(s=>s.id===slotId);if(!slot)return;pushUndo();slot.areaId=slot.splitAId||slot.splitBId||null;slot.split=false;slot.splitAId=null;slot.splitBId=null;saveDB();refreshHorario();toast('Reunificada');}
function unsplitSlot(diaK,slotId){tap();openConfirm('¿Reunificar esta sesión?','Si',`actionUnsplitSlot('${diaK}','${slotId}')`);}
function toggleSplitMode(){tap();openModal(`<div class="modal-title">⚡ Dividir sesión</div><div class="fg"><label>Día</label><select id="split-dia">${DIAS_K.map((d,i)=>`<option value="${d}">${DIAS_N[i]}</option>`).join('')}</select></div><div class="fg"><label>Sesión</label><select id="split-slot"></select></div><div class="modal-actions"><button class="btn btn-accent" onclick="confirmSplit()">⚡ Dividir</button><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button></div>`);setTimeout(()=>{const dsel=document.getElementById('split-dia');const ssel=document.getElementById('split-slot');const refresh=()=>{const slots=(DB.horario[dsel.value]||[]).filter(s=>!s.recreo&&!s.split);ssel.innerHTML=slots.map(s=>`<option value="${s.id}">${s.inicio}–${s.fin}</option>`).join('');};dsel.addEventListener('change',refresh);refresh();},50);}
function confirmSplit(){const diaK=document.getElementById('split-dia').value;const slotId=document.getElementById('split-slot').value;const slot=DB.horario[diaK]?.find(s=>s.id===slotId);if(slot){pushUndo();slot.split=true;slot.splitAId=slot.areaId||null;slot.splitBId=null;slot.areaId=null;saveDB();closeModal();refreshHorario();toast('Dividida');}}
function addSlotRow(){tap();openModal(`<div class="modal-title">➕ Añadir tramo</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label>Inicio</label><input type="time" id="ns-inicio" value="08:00"></div><div class="fg"><label>Fin</label><input type="time" id="ns-fin" value="09:00"></div></div><div class="fg"><label>Tipo</label><div style="display:flex;gap:12px;margin-top:4px"><label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:600"><input type="radio" name="ns-tipo" value="sesion" checked> Sesión</label><label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:600"><input type="radio" name="ns-tipo" value="recreo"> ☀️ Recreo</label></div></div><div class="modal-actions"><button class="btn btn-accent" onclick="saveNewSlot()">Guardar</button><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button></div>`);}
function saveNewSlot(){const inicio=document.getElementById('ns-inicio').value;const fin=document.getElementById('ns-fin').value;if(inicio>=fin){toast('Fin debe ser posterior');return;}const esRecreo=document.querySelector('input[name=ns-tipo]:checked')?.value==='recreo';if(!DB.tramoBase)DB.tramoBase=[];DB.tramoBase.push({id:uid(),inicio,fin,recreo:esRecreo});DB.tramoBase.sort((a,b)=>a.inicio.localeCompare(b.inicio));DIAS_K.forEach(dia=>{if(!DB.horario[dia])DB.horario[dia]=[];DB.horario[dia].push({id:uid(),inicio,fin,areaId:null,split:false,splitAId:null,splitBId:null,recreo:esRecreo});DB.horario[dia].sort((a,b)=>a.inicio.localeCompare(b.inicio));});saveDB();closeModal();renderTab();toast('Tramo añadido');}
function addArea(){tap();const initColor=COLORS[colorIdx%COLORS.length];openModal(`<div class="modal-title">📚 Nueva área</div><div class="fg"><label>Tipo</label><div style="display:flex;gap:12px"><label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:600"><input type="radio" name="tipo" value="docencia" checked> 📖 Docencia</label><label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:600"><input type="radio" name="tipo" value="nd"> 🗂️ No docencia</label></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="fg"><label>Nombre</label><input type="text" id="an-nombre" placeholder="Ej: Matemáticas"></div><div class="fg"><label>Aula / Grupo</label><input type="text" id="an-grupo" placeholder="Ej: 3ºA"></div></div>${colorModalHTML(initColor,'an')}<div class="modal-actions"><button class="btn btn-accent" onclick="saveArea()">💾 Guardar</button><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button></div>`);setTimeout(()=>selColor(initColor,'an'),40);}
function saveArea(){const n=document.getElementById('an-nombre').value.trim();if(!n){toast('Introduce un nombre');return;}const t=document.querySelector('input[name=tipo]:checked')?.value||'docencia';const g=document.getElementById('an-grupo')?.value.trim()||'';const c=document.getElementById('an-color')?.value||nextColor();pushUndo();DB.areas.push({id:uid(),nombre:n,tipo:t,grupo:g,color:c});colorIdx++;saveDB();closeModal();renderTab();toast('Área creada');}

function renderResumen(){const lunes=getMonday(selDate);let totalMin=0;const byArea={};for(let i=0;i<5;i++){const d=new Date(lunes);d.setDate(d.getDate()+i);const dkKey=diaKey(d);const slots=(dkKey?DB.horario[dkKey]:[])||[];slots.forEach(s=>{if(s.recreo)return;const min=slotMin(s);if(s.split){if(s.splitAId){if(!byArea[s.splitAId])byArea[s.splitAId]=0;byArea[s.splitAId]+=Math.floor(min/2);totalMin+=Math.floor(min/2);}if(s.splitBId){if(!byArea[s.splitBId])byArea[s.splitBId]=0;byArea[s.splitBId]+=Math.floor(min/2);totalMin+=Math.floor(min/2);}}else if(s.areaId){if(!byArea[s.areaId])byArea[s.areaId]=0;byArea[s.areaId]+=min;totalMin+=min;}});}const bars=Object.entries(byArea).sort((a,b)=>b[1]-a[1]).map(([id,min])=>{const a=getArea(id);if(!a)return '';const pct=totalMin>0?Math.round(min/totalMin*100):0;return `<div class="bar-row"><div class="bar-row-top"><span style="display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;border-radius:50%;background:${a.color};display:inline-block"></span>${areaLabel(id)}</span><span>${(min/60).toFixed(1)}h</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${a.color}"></div></div></div>`;}).join('');return `<div class="card"><div class="stat-grid"><div class="stat-card"><div class="stat-val">${(totalMin/60).toFixed(1)}h</div><div class="stat-lbl">Horas lectivas</div></div></div>${bars||'<div class="empty"><p>Sin datos.</p></div>'}</div>`;}

let gcState={month:new Date().getMonth(),year:new Date().getFullYear()};
function openGotoDate(){tap();gcState.month=selDate.getMonth();gcState.year=selDate.getFullYear();openModal(`<div class="modal-title">📅 Ir a fecha</div><div id="goto-cal">${buildGotoCalHTML()}</div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button></div>`);}
function buildGotoCalHTML(){const hoy=new Date();const pm=new Date(gcState.year,gcState.month,1);const dm=new Date(gcState.year,gcState.month+1,0).getDate();let di=pm.getDay();if(di===0)di=7;di--;const prev=new Date(gcState.year,gcState.month,0).getDate();let cells='';for(let i=di-1;i>=0;i--)cells+=`<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.78rem;color:var(--paper3)">${prev-i}</div>`;for(let d=1;d<=dm;d++){const dt=new Date(gcState.year,gcState.month,d);const dk=fmtDate(dt);const isSel=dk===fmtDate(selDate);const isT=dk===fmtDate(hoy);const dow=dt.getDay();const isWknd=dow===0||dow===6;cells+=`<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:600;background:${isSel?'var(--accent)':isT?'var(--blue)':'transparent'};color:${isSel||isT?'#fff':isWknd?'var(--ink3)':'var(--ink)'};border-radius:7px;cursor:pointer" onclick="selDate=new Date('${dk}T12:00:00');closeModal();renderTab()">${d}</div>`;}const tot=di+dm;const sig=tot%7===0?0:7-(tot%7);for(let i=1;i<=sig;i++)cells+=`<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.78rem;color:var(--paper3)">${i}</div>`;return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><button class="btn btn-ghost btn-sm" onclick="gcState.month--;if(gcState.month<0){gcState.month=11;gcState.year--;}document.getElementById('goto-cal').innerHTML=buildGotoCalHTML()">‹</button><span style="font-weight:700;font-size:.9rem">${MESES[gcState.month]} ${gcState.year}</span><button class="btn btn-ghost btn-sm" onclick="gcState.month++;if(gcState.month>11){gcState.month=0;gcState.year++;}document.getElementById('goto-cal').innerHTML=buildGotoCalHTML()">›</button></div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">${DIAS_C.map(d=>`<div style="text-align:center;font-size:.62rem;font-weight:800;color:var(--ink3);text-transform:uppercase;padding:3px 0">${d}</div>`).join('')}${cells}</div>`;}

function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return [r,g,b];}

const LOGO_URL='https://raw.githubusercontent.com/ManuelVS8/Audios-juegos-SCIENCE/refs/heads/main/icono.png';
let pdfLogoBase64=null;let logoLoadAttempted=false;
function getLogoBase64(){return new Promise(resolve=>{if(pdfLogoBase64)return resolve(pdfLogoBase64);if(logoLoadAttempted&&!pdfLogoBase64)return resolve(null);const img=new Image();img.crossOrigin='Anonymous';img.onload=()=>{try{const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;const ctx=c.getContext('2d');ctx.drawImage(img,0,0);pdfLogoBase64=c.toDataURL('image/png');}catch(e){pdfLogoBase64=null;}logoLoadAttempted=true;resolve(pdfLogoBase64);};img.onerror=()=>{logoLoadAttempted=true;resolve(null);};img.src=LOGO_URL;});}

async function drawPdfHeader(doc){const margin=14;let y=18;const p=DB.personal;const pageW=doc.internal.pageSize.getWidth();const rx=pageW-margin;const logoData=await getLogoBase64();if(logoData){doc.addImage(logoData,'PNG',margin,y-3,12,12);doc.setFontSize(16);doc.setFont('helvetica','bold');doc.setTextColor(15,28,46);doc.text('SiurotPlan',margin+15,y+3.5);}else{doc.setFillColor(232,82,10);doc.roundedRect(margin,y-3,12,12,2,2,'F');doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);doc.text('S',margin+4,y+5);doc.setTextColor(15,28,46);doc.setFontSize(16);doc.text('SiurotPlan',margin+15,y+3.5);}doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(150);doc.text('Programacion docente',margin+15,y+7.5);doc.setFontSize(8);doc.setTextColor(80);let hdrY=y;if(p.nombre){doc.setFont('helvetica','bold');doc.text(p.nombre,rx,hdrY,{align:'right'});hdrY+=4;}if(p.puesto){doc.setFont('helvetica','normal');doc.text(p.puesto,rx,hdrY,{align:'right'});hdrY+=4;}if(p.centro){doc.text(p.centro,rx,hdrY,{align:'right'});hdrY+=4;}if(p.curso){doc.text('Curso '+p.curso,rx,hdrY,{align:'right'});hdrY+=4;}y=Math.max(y+14,hdrY+2);doc.setDrawColor(15,28,46);doc.setLineWidth(1.2);doc.line(margin,y,pageW-margin,y);y+=8;return y;}

function buildDayRows(dk){const dkKey=diaKey(new Date(dk+'T12:00:00'));const slots=dkKey?(DB.horario[dkKey]||[]):[];const plan=DB.plan[dk]||{};const rows=[];slots.forEach(s=>{if(s.recreo){rows.push({recreo:true,txt:'RECREO '+s.inicio+'–'+s.fin});return;}if(s.split){const mid=calcMid(s.inicio,s.fin);[[s.id+'_a',s.splitAId,s.inicio,mid],[s.id+'_b',s.splitBId,mid,s.fin]].forEach(([sid,aId,ini,fi])=>{const a=getArea(aId);const pv=plan[sid]||{};rows.push({inicio:ini,fin:fi,area:a?a.nombre+(a.grupo?' ('+a.grupo+')':''):'—',texto:pv.texto||'',color:a?a.color:'#999999',half:true});});}else{const a=getArea(s.areaId);const pv=plan[s.id]||{};rows.push({inicio:s.inicio,fin:s.fin,area:a?a.nombre+(a.grupo?' ('+a.grupo+')':''):'—',texto:pv.texto||'',color:a?a.color:'#999999',half:false});}});return rows;}

function addDaySection(doc,dk,y){const pageW=doc.internal.pageSize.getWidth();const margin=14;const nota=DB.notas[dk]||'';const d=new Date(dk+'T12:00:00');const dStr=d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});const title=dStr.charAt(0).toUpperCase()+dStr.slice(1);if(y>240){doc.addPage();y=20;}doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(15,28,46);doc.text(title,margin,y);y+=2;doc.setDrawColor(232,82,10);doc.setLineWidth(0.8);doc.line(margin,y,pageW-margin,y);y+=6;const rows=buildDayRows(dk);if(!rows.length){doc.setFontSize(9);doc.setTextColor(150);doc.text('Sin programación',margin,y+6);return y+14;}const tableRows=rows.map(r=>{if(r.recreo)return [{content:r.txt,colSpan:3,styles:{halign:'center',fontStyle:'italic',textColor:[150,150,150],fillColor:[245,245,245]}}];return [r.inicio+'\n'+r.fin,{content:(r.half?r.area+' (1/2)':r.area),styles:{textColor:hexToRgb(r.color),fontStyle:'bold'}},r.texto||'—'];});doc.autoTable({startY:y,head:[[{content:'Hora',styles:{fillColor:[15,28,46]}},{content:'Area',styles:{fillColor:[15,28,46]}},{content:'Actividad / Contenidos',styles:{fillColor:[15,28,46]}}]],body:tableRows,margin:{left:margin,right:margin},columnStyles:[{0:{cellWidth:24,fontSize:7.5}},{1:{cellWidth:38,fontSize:8}},{2:{fontSize:8}}],styles:{cellPadding:3,fontSize:8,valign:'top',overflow:'linebreak'},headStyles:{textColor:[255,255,255],fontStyle:'bold',fontSize:7.5}});y=doc.lastAutoTable.finalY+4;if(nota){if(y>265){doc.addPage();y=20;}doc.setFillColor(255,251,245);doc.rect(margin,y,pageW-margin*2,14,'F');doc.setDrawColor(232,82,10);doc.setLineWidth(0.5);doc.line(margin,y,margin,y+14);doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(232,82,10);doc.text('Notas:',margin+4,y+5);doc.setFont('helvetica','normal');doc.setTextColor(80,80,80);const splitNota=doc.splitTextToSize(nota,pageW-margin*2-8);doc.text(splitNota,margin+4,y+10);y+=14+splitNota.length*3.5;}return y;}

async function downloadDayPDF(dk){tap();showPdfLoading();setTimeout(async()=>{try{const{jsPDF}=window.jspdf;const doc=new jsPDF('p','mm','a4');const margin=14;let y=await drawPdfHeader(doc);y=addDaySection(doc,dk,y);doc.setFontSize(7);doc.setTextColor(180);doc.text('Generado con SiurotPlan · '+new Date().toLocaleDateString('es-ES'),margin,285);doc.save('SiurotPlan_'+dk+'.pdf');hidePdfLoading();toast('PDF descargado');}catch(e){hidePdfLoading();toast('Error generando PDF');console.error(e);}},100);}

let rpState={month:new Date().getMonth(),year:new Date().getFullYear(),start:null,end:null};
function openRangePDFPicker(){rpState.start=null;rpState.end=null;rpState.month=selDate.getMonth();rpState.year=selDate.getFullYear();openModal(`<div class="modal-title">PDF de periodo</div><p class="text-sm text-muted" style="margin-bottom:10px">Selecciona la fecha de inicio y fin del periodo.</p><div class="range-display" id="rp-display">Pulsa el día de inicio →</div><div id="rpicker-wrap">${buildRPickerHTML()}</div><div class="modal-actions"><button class="btn btn-teal" id="rp-gen-btn" onclick="generateRangePDF()" style="display:none">⬇️ Generar PDF</button><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button></div>`);}
function buildRPickerHTML(){const hoy=new Date();const pm=new Date(rpState.year,rpState.month,1);const dm=new Date(rpState.year,rpState.month+1,0).getDate();let di=pm.getDay();if(di===0)di=7;di--;const prev=new Date(rpState.year,rpState.month,0).getDate();let cells='';for(let i=di-1;i>=0;i--)cells+=`<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.78rem;color:var(--paper3)">${prev-i}</div>`;for(let d=1;d<=dm;d++){const dt=new Date(rpState.year,rpState.month,d);const dk=fmtDate(dt);const dow=dt.getDay();const isWknd=dow===0||dow===6;const isToday=dk===fmtDate(hoy);const isStart=rpState.start&&dk===rpState.start;const isEnd=rpState.end&&dk===rpState.end;const inRange=rpState.start&&rpState.end&&dk>rpState.start&&dk<rpState.end;let bg='transparent',color=isWknd?'var(--ink3)':'var(--ink)',outline='';if(isStart||isEnd){bg='var(--accent)';color='#fff';}else if(inRange){bg='rgba(232,82,10,.12)';color='var(--accent)';}if(isToday)outline='outline:2px solid var(--blue2);outline-offset:-2px;';cells+=`<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:600;background:${bg};color:${color};border-radius:7px;cursor:pointer;${outline}" onclick="rpClick('${dk}')">${d}</div>`;}const tot=di+dm;const sig=tot%7===0?0:7-(tot%7);for(let i=1;i<=sig;i++)cells+=`<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.78rem;color:var(--paper3)">${i}</div>`;return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><button class="btn btn-ghost btn-sm" onclick="rpState.month--;if(rpState.month<0){rpState.month=11;rpState.year--;}document.getElementById('rpicker-wrap').innerHTML=buildRPickerHTML()">‹</button><span style="font-weight:700;font-size:.9rem">${MESES[rpState.month]} ${rpState.year}</span><button class="btn btn-ghost btn-sm" onclick="rpState.month++;if(rpState.month>11){rpState.month=0;rpState.year++;}document.getElementById('rpicker-wrap').innerHTML=buildRPickerHTML()">›</button></div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">${DIAS_C.map(d=>`<div style="text-align:center;font-size:.62rem;font-weight:800;color:var(--ink3);text-transform:uppercase;padding:3px 0">${d}</div>`).join('')}${cells}</div>`;}
function rpClick(dk){if(!rpState.start||(rpState.start&&rpState.end)){rpState.start=dk;rpState.end=null;}else{if(dk<rpState.start){rpState.end=rpState.start;rpState.start=dk;}else{rpState.end=dk;}}const wrap=document.getElementById('rpicker-wrap');if(wrap)wrap.innerHTML=buildRPickerHTML();const disp=document.getElementById('rp-display');const genBtn=document.getElementById('rp-gen-btn');if(disp){if(rpState.start&&!rpState.end){const ds=new Date(rpState.start+'T12:00:00');disp.innerHTML=`<strong>Inicio:</strong> ${ds.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'long'})} → <span style="color:var(--ink3)">selecciona el día final</span>`;}else if(rpState.start&&rpState.end){const ds=new Date(rpState.start+'T12:00:00');const de=new Date(rpState.end+'T12:00:00');let cnt=0;let tmp=new Date(rpState.start+'T12:00:00');while(fmtDate(tmp)<=rpState.end){if(tmp.getDay()!==0&&tmp.getDay()!==6)cnt++;tmp.setDate(tmp.getDate()+1);}disp.innerHTML=`<strong style="color:var(--accent)">${ds.toLocaleDateString('es-ES',{day:'numeric',month:'short'})}</strong> → <strong style="color:var(--accent)">${de.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'})}</strong> <span style="color:var(--ink3);font-size:.78rem">(${cnt} días lectivos)</span>`;if(genBtn)genBtn.style.display='inline-flex';}}}
async function generateRangePDF(){if(!rpState.start||!rpState.end){toast('Selecciona inicio y fin');return;}closeModal();showPdfLoading();setTimeout(async()=>{try{const{jsPDF}=window.jspdf;const doc=new jsPDF('p','mm','a4');const margin=14;let y=await drawPdfHeader(doc);const ds=new Date(rpState.start+'T12:00:00');const de=new Date(rpState.end+'T12:00:00');const rangeStr=ds.toLocaleDateString('es-ES',{day:'numeric',month:'long'})+' – '+de.toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(232,82,10);doc.text('Programacion del '+rangeStr,margin,y);y+=8;let cur=new Date(rpState.start+'T12:00:00');while(fmtDate(cur)<=rpState.end){const dkKey=diaKey(cur);if(dkKey){const dk=fmtDate(cur);y=addDaySection(doc,dk,y);}cur.setDate(cur.getDate()+1);}doc.setFontSize(7);doc.setTextColor(180);doc.text('Generado con SiurotPlan · '+new Date().toLocaleDateString('es-ES'),margin,285);doc.save(`SiurotPlan_${rpState.start}_${rpState.end}.pdf`);hidePdfLoading();toast('PDF descargado');}catch(e){hidePdfLoading();toast('Error generando PDF');console.error(e);}},100);}

// === CÓDIGO NUEVO PARA EL BOTÓN DE INSTALACIÓN ===
let eventoInstalacion;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  eventoInstalacion = e;
  const botonInstalar = document.getElementById('btnInstalar');
  if (botonInstalar) {
    botonInstalar.style.display = 'inline-flex';
  }
});

document.getElementById('btnInstalar')?.addEventListener('click', async () => {
  if (!eventoInstalacion) return;
  
  eventoInstalacion.prompt();
  
  const { outcome } = await eventoInstalacion.userChoice;
  console.log(`El usuario eligió: ${outcome}`);
  
  if (outcome === 'accepted') {
    document.getElementById('btnInstalar').style.display = 'none';
    eventoInstalacion = null;
  }
});

window.addEventListener('appinstalled', () => {
  document.getElementById('btnInstalar').style.display = 'none';
  eventoInstalacion = null;
  console.log('¡SiurotPlan instalada con éxito!');
});
